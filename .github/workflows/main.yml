name: Code Analyzer CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Node.js (FIXED VERSION)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22   # ✅ IMPORTANT FIX
          cache: 'npm'

      # 3️⃣ Install Backend Dependencies
      - name: Install backend dependencies
        run: |
          cd code-analyzer-backend
          npm install

      # 4️⃣ Install Frontend Dependencies
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      # 5️⃣ Build Frontend
      - name: Build frontend
        run: |
          cd frontend
          npm run build